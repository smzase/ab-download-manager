on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:


permissions:
  actions: write
  contents: write

jobs:
  create-packages:
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest", "ubuntu-24.04-arm", "windows-2022", "windows-11-arm", "macos-15-intel", "macos-15" ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JBR
        uses: actions/setup-java@v5
        with:
          distribution: "jetbrains"
          java-package: "jdk"
          java-version: "25"
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ matrix.os }}-gradle
          enableCrossOsArchive: true

      - name: Skip Android build (build android only on Ubuntu)
        if: matrix.os != 'ubuntu-latest'
        shell: "bash"
        run: |
          echo "SKIP_ANDROID_BUILD=true" >> $GITHUB_ENV

      - name: Configure Android signing
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          ABDM_KEYSTORE_FILE: ${{ secrets.ABDM_KEYSTORE_FILE }}
          ABDM_KEYSTORE_FILE_PASSWORD: ${{ secrets.ABDM_KEYSTORE_FILE_PASSWORD }}
          ABDM_KEYSTORE_KEY_ALIAS: ${{ secrets.ABDM_KEYSTORE_KEY_ALIAS }}
          ABDM_KEYSTORE_KEY_PASSWORD: ${{ secrets.ABDM_KEYSTORE_KEY_PASSWORD }}
        run: |
          required=(
            ABDM_KEYSTORE_FILE
            ABDM_KEYSTORE_FILE_PASSWORD
            ABDM_KEYSTORE_KEY_ALIAS
            ABDM_KEYSTORE_KEY_PASSWORD
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Android signing secret ${key} is not configured; skipping Android package build."
              echo "SKIP_ANDROID_BUILD=true" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          {
            echo "ABDM_KEYSTORE_FILE=${ABDM_KEYSTORE_FILE}"
            echo "ABDM_KEYSTORE_FILE_PASSWORD=${ABDM_KEYSTORE_FILE_PASSWORD}"
            echo "ABDM_KEYSTORE_KEY_ALIAS=${ABDM_KEYSTORE_KEY_ALIAS}"
            echo "ABDM_KEYSTORE_KEY_PASSWORD=${ABDM_KEYSTORE_KEY_PASSWORD}"
          } >> "$GITHUB_ENV"

      # Steps specific to macOS (to create DMG for macOS)
      - name: Install create-dmg (for macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew install create-dmg

      - name: Gradle
        run: |
          ./gradlew
        shell: "bash"

      - name: Build package for current OS using gradle
        shell: bash
        run: |
          ./gradlew createReleaseFolderForCi

      - name: Release Gradle to unlock cache files
        shell: bash
        run: |
          ./gradlew -stop

      - name: Upload output to artifacts
        uses: actions/upload-artifact@v7
        with:
          path: ./build/ci-release
          name: app-${{ matrix.os }}

  release:
    runs-on: "ubuntu-latest"
    needs: [ "create-packages" ]
    steps:
      - uses: "actions/download-artifact@v7"
        name: "Download All Artifacts Into One Directory"
        with:
          path: release
          pattern: app-*
          merge-multiple: true

      - name: Version Info
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z.-]+))?(\+([0-9A-Za-z.-]+))?$ ]]; then
            echo "Invalid version tag: $tag" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          prerelease="${BASH_REMATCH[5]}"
          if [[ "$major" != "0" && -z "$prerelease" ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Show the output tree of release"
        run: |
          tree .
      - uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ steps.version.outputs.is_stable != 'true' }}
          make_latest: legacy
          draft: true
          files: |
            release/binaries/*
          body_path: release/release-notes.md
      - name: "Remove artifacts to free space"
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          artifact_ids="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith("app-")) | .id')"
          if [ -z "$artifact_ids" ]; then
            exit 0
          fi

          while IFS= read -r artifact_id; do
            gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/${artifact_id}" >/dev/null
          done <<< "$artifact_ids"
